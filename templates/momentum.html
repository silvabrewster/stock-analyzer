<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanning...</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0b0e14; --surf: #111620; --border: #1e2535; --gold: #c9a84c; --gold2: #f0d080; --text: #e8eaf0; --muted: #6b7280; --green: #4ade80; --red: #f87171; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(201,168,76,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.025) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    .card {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: 16px; padding: 52px 48px; text-align: center;
      max-width: 440px; width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4);
    }
    .spinner {
      width: 56px; height: 56px; border-radius: 50%;
      border: 3px solid var(--border); border-top-color: var(--gold);
      animation: spin 1s linear infinite; margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-family: 'DM Serif Display', serif; font-size: 24px; margin-bottom: 12px; }
    p  { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
    .status-msg {
      font-family: 'DM Mono', monospace; font-size: 12px;
      color: var(--gold); margin-top: 16px; min-height: 18px;
    }
    .tickers {
      display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
      margin: 20px 0; font-family: 'DM Mono', monospace; font-size: 11px;
    }
    .tk {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 8px; color: var(--muted);
      animation: flicker 3s infinite;
    }
    .tk:nth-child(2n) { animation-delay: 0.5s; }
    .tk:nth-child(3n) { animation-delay: 1s; }
    .tk:nth-child(4n) { animation-delay: 1.5s; }
    @keyframes flicker {
      0%,100% { color: var(--muted); border-color: var(--border); }
      50% { color: var(--gold); border-color: var(--gold); }
    }
    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 20px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 2px; width: 0%; transition: width 0.5s ease; }
    .done-check { font-size: 40px; display: none; margin: 0 auto 16px; }
    .error-msg { color: var(--red); font-size: 13px; margin-top: 12px; display: none; }
    .view-btn {
      display: none; margin-top: 20px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #0b0e14; border: none; border-radius: 8px;
      padding: 12px 28px; font-size: 14px; font-weight: 600;
      cursor: pointer; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <div class="done-check" id="done-check">✅</div>
    <h2 id="title">Scanning Markets...</h2>
    <p>Running momentum scan across ~60 penny stocks and small caps.</p>
    <p>This takes 2-3 minutes. Page checks automatically every 15 seconds.</p>
    <div class="status-msg" id="status-msg">Initializing scan...</div>

    <div class="tickers">
      <span class="tk">SOFI</span><span class="tk">HOOD</span><span class="tk">IONQ</span>
      <span class="tk">SNDL</span><span class="tk">WKHS</span><span class="tk">JOBY</span>
      <span class="tk">NIO</span><span class="tk">LCID</span><span class="tk">AFRM</span>
      <span class="tk">UPST</span><span class="tk">DKNG</span><span class="tk">SPCE</span>
      <span class="tk">SKLZ</span><span class="tk">HIMS</span><span class="tk">BLNK</span>
      <span class="tk">CHPT</span><span class="tk">EVGO</span><span class="tk">MVIS</span>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="error-msg" id="error-msg"></div>
    <a href="/momentum" class="view-btn" id="view-btn">View Results →</a>
  </div>

  <script>
    let elapsed  = 0;
    const total  = 180; // estimated seconds
    const msgs   = [
      'Fetching insider trades...',
      'Downloading price history...',
      'Calculating volume spikes...',
      'Checking breakout levels...',
      'Scoring momentum signals...',
      'Almost done...',
    ];
    let msgIdx = 0;

    // Update progress bar and status message
    const progressInterval = setInterval(() => {
      elapsed += 5;
      const pct = Math.min(95, (elapsed / total) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      if (elapsed % 20 === 0) {
        document.getElementById('status-msg').textContent = msgs[msgIdx % msgs.length];
        msgIdx++;
      }
    }, 5000);

    // Poll status every 15 seconds
    async function checkStatus() {
      try {
        const res  = await fetch('/momentum/status');
        const data = await res.json();

        if (data.done) {
          clearInterval(progressInterval);
          clearInterval(pollInterval);
          document.getElementById('progress-fill').style.width = '100%';
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('done-check').style.display = 'block';
          document.getElementById('title').textContent = 'Scan Complete!';
          document.getElementById('status-msg').textContent = 'Results ready.';
          document.getElementById('view-btn').style.display = 'inline-block';
          // Auto redirect after 2 seconds
          setTimeout(() => window.location.href = '/momentum', 2000);

        } else if (data.error) {
          clearInterval(progressInterval);
          clearInterval(pollInterval);
          document.getElementById('error-msg').style.display = 'block';
          document.getElementById('error-msg').textContent = 'Scan error: ' + data.error + '. Click below to try again.';
          document.getElementById('view-btn').style.display = 'inline-block';
          document.getElementById('view-btn').textContent = '← Back to Momentum';

        } else if (data.running) {
          document.getElementById('status-msg').textContent = msgs[msgIdx % msgs.length];
          msgIdx++;
        }
      } catch(e) {
        console.log('Status check failed:', e);
      }
    }

    const pollInterval = setInterval(checkStatus, 15000);
    // First check after 30 seconds
    setTimeout(checkStatus, 30000);
  </script>
</body>
</html>
