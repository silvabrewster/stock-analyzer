<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanning...</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <meta http-equiv="refresh" content="90;url=/momentum">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0b0e14; --surf: #111620; --border: #1e2535; --gold: #c9a84c; --gold2: #f0d080; --text: #e8eaf0; --muted: #6b7280; --green: #4ade80; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(201,168,76,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.025) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    .card {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: 16px; padding: 52px 48px; text-align: center;
      max-width: 440px; width: 100%;
    }
    .spinner {
      width: 56px; height: 56px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-family: 'DM Serif Display', serif; font-size: 24px; margin-bottom: 12px; }
    p  { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
    .tickers {
      display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
      margin: 24px 0; font-family: 'DM Mono', monospace; font-size: 11px;
    }
    .tk {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 8px; color: var(--muted);
      animation: flicker 3s infinite;
    }
    .tk:nth-child(2n) { animation-delay: 0.5s; }
    .tk:nth-child(3n) { animation-delay: 1s; }
    @keyframes flicker {
      0%,100% { color: var(--muted); border-color: var(--border); }
      50% { color: var(--gold); border-color: var(--gold); }
    }
    .back-btn {
      display: inline-block; margin-top: 20px;
      color: var(--muted); font-size: 13px; text-decoration: none;
      border: 1px solid var(--border); border-radius: 8px; padding: 8px 18px;
      transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--gold); }
    .progress-bar {
      height: 3px; background: var(--border); border-radius: 2px;
      overflow: hidden; margin-top: 24px;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2));
      border-radius: 2px; animation: progress 90s linear forwards;
    }
    @keyframes progress { from { width: 0%; } to { width: 100%; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h2>Scanning Markets...</h2>
    <p>Running momentum scan across ~80 penny stocks and small caps.</p>
    <p>This takes about 3-4 minutes. The page will refresh automatically.</p>

    <div class="tickers">
      <span class="tk">SOFI</span><span class="tk">HOOD</span><span class="tk">IONQ</span>
      <span class="tk">SNDL</span><span class="tk">WKHS</span><span class="tk">JOBY</span>
      <span class="tk">NIO</span><span class="tk">LCID</span><span class="tk">AFRM</span>
      <span class="tk">UPST</span><span class="tk">DKNG</span><span class="tk">SPCE</span>
      <span class="tk">SKLZ</span><span class="tk">HIMS</span><span class="tk">BLNK</span>
      <span class="tk">CHPT</span><span class="tk">EVGO</span><span class="tk">MVIS</span>
    </div>

    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>

    <a href="/momentum" class="back-btn">← Check results now</a>
  </div>

  <script>
    // Auto-check every 30 seconds if results are ready
    let checks = 0;
    const interval = setInterval(async () => {
      checks++;
      if (checks > 8) { clearInterval(interval); return; }
      try {
        const res  = await fetch('/momentum');
        const text = await res.text();
        // If results are in the page, redirect
        if (text.includes('penny-table') && text.includes('<tbody>') && !text.includes('empty-state')) {
          window.location.href = '/momentum';
        }
      } catch(e) {}
    }, 30000);
  </script>
</body>
</html>
