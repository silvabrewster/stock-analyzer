services:
  # ── Main Web App ─────────────────────────────────────────────────────────────
  - type: web
    name: stock-analyzer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /ping
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: APP_PASSWORD
        sync: false          # set manually in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: VAPID_PUBLIC
        sync: false
      - key: VAPID_PRIVATE
        sync: false
      - key: DATABASE_URL
        sync: false          # set to Postgres URL if using Supabase/Render Postgres
      - key: APP_URL
        sync: false          # e.g. https://stock-analyzer-xxxx.onrender.com
      - key: RESEND_KEY
        sync: false
      - key: SCAN_TOKEN
        sync: false          # secret string; cron sends this to /api/run-scan

  # ── Daily Scan Cron — 7AM Pacific (14:00 UTC) Mon-Fri ────────────────────────
  # Paid Render plan required. Free alternative: cron-job.org POST to
  # /api/run-scan with header X-Scan-Token: <SCAN_TOKEN> at 14:00 UTC weekdays.
  - type: cron
    name: stock-analyzer-daily-scan
    runtime: python
    plan: starter
    schedule: "0 14 * * 1-5"
    buildCommand: pip install requests
    startCommand: >
      python -c "import os,requests;r=requests.post(os.environ['APP_URL'].rstrip('/')+'/api/run-scan',headers={'X-Scan-Token':os.environ.get('SCAN_TOKEN','')},timeout=30);print(r.status_code,r.text)"
    envVars:
      - key: APP_URL
        sync: false
      - key: SCAN_TOKEN
        sync: false

  # ── Keep-Alive Cron — pings /ping every 10 minutes ───────────────────────────
  # Paid Render plan required. Free alternative: cron-job.org → /ping every 10min.
  - type: cron
    name: stock-analyzer-keepalive
    runtime: python
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: pip install requests
    startCommand: python keepalive.py --once
    envVars:
      - key: APP_URL
        sync: false
